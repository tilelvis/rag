name: Generate Dataset

on:
  push:
    branches: [main]
    paths-ignore:
      - "output/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate and validate dataset
        run: python3 generate_dataset.py --output-dir output

      - name: Export RAG corpus (per-document files + JSONL)
        run: python3 export_corpus.py --output-dir output

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: londiani-worshippers-dataset
          path: output/

      - name: Commit generated output back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: regenerate dataset output [skip ci]"
          git push
